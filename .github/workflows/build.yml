name: Build N60 Pro Firmware

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo pip3 install pyelftools

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-openwrt-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-openwrt-

      - name: Clone source
        run: |
          git clone -b openwrt-24.10-6.6 --single-branch --depth=1 \
            https://github.com/padavanonly/immortalwrt-mt798x-24.10.git openwrt

      - name: Setup feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd openwrt
          cp defconfig/mt7975-ipailna-high-power.config .config

          sed -i "/CONFIG_TARGET_DEVICE_/d" .config
          cat >> .config << 'EOF'
CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_netcore_n60-pro=y
CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_netcore_n60-pro=""
EOF

          sed -i "s/CONFIG_PACKAGE_dnsmasq-full=y/CONFIG_PACKAGE_dnsmasq-full=n/" .config
          echo "CONFIG_PACKAGE_dnsmasq=y" >> .config
          echo "CONFIG_PACKAGE_dnsmasq-dhcpv6=y" >> .config

          cat >> .config << 'EOF'
CONFIG_PACKAGE_luci-app-ddns=y
CONFIG_PACKAGE_ddns-scripts=y
CONFIG_PACKAGE_ddns-scripts-services=y
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_libcurl=y
CONFIG_PACKAGE_bind-host=y
CONFIG_PACKAGE_bind-libs=y
CONFIG_PACKAGE_bind-dig=y
EOF

          sed -i 's/192.168.6.1/192.168.2.1/g' package/base-files/files/bin/config_generate
          make defconfig

      - name: Build firmware
        run: |
          cd openwrt
          export CCACHE_DIR=~/.ccache
          export CCACHE_COMPRESS=1
          export CCACHE_MAXSIZE=2G
          export USE_CCACHE=1
          make -j$(nproc) 2>&1
        timeout-minutes: 360

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: N60Pro-firmware
          path: |
            openwrt/bin/targets/mediatek/filogic/*.itb
            openwrt/bin/targets/mediatek/filogic/*.bin
            openwrt/bin/targets/mediatek/filogic/*.fip
            openwrt/bin/targets/mediatek/filogic/*.manifest
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: openwrt/logs/
